<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Sync Dark Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #toolbar {
            position: fixed;
            right: -70px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            background-color: #1a1a1a;
            border-left: 1px solid #333;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            border-radius: 12px 0 0 12px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.8);
            z-index: 100;
            max-height: 90vh; /* Prevents overflow on small screens */
            overflow-y: auto; /* Allows scrolling inside toolbar if needed */
        }
        
        /* Hides the scrollbar for aesthetics */
        #toolbar::-webkit-scrollbar { display: none; }

        #toolbar::before {
            content: '';
            position: absolute;
            left: -40px;
            top: 0;
            width: 40px;
            height: 100%;
            background: transparent;
        }

        #toolbar.open {
            right: 0;
        }
        
        @media (hover: hover) and (pointer: fine) {
            #toolbar:hover, #toolbar:focus-within {
                right: 0;
            }
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #fff; border-radius: 50%; }

        input[type="range"] {
            writing-mode: vertical-lr;
            direction: rtl;
            height: 100px;
            width: 8px;
            accent-color: #fff;
            cursor: pointer;
        }

        button {
            background-color: transparent;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #fff; color: #000; }
        
        .tool-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -10px;
        }

        #live-status {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #888;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        .dot.connected {
            background-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }
        
        .dot.warning {
            background-color: #ffaa00;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.6);
        }

        /* --- Floating Quick Tools (Undo/Redo) --- */
        #quick-tools {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .icon-btn {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: #fff;
            color: #000;
        }

        /* Login Overlay Styles */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #fff;
        }
        #login-overlay input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            width: 200px;
        }
        #loginError {
            color: #ff3333;
            font-size: 12px;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Login to Draw</h2>
        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">
        <button id="loginBtn" style="width: 220px; padding: 10px; background: #fff; color: #000;">Login</button>
        <p id="loginError"></p>
    </div>

    <div id="live-status">
        <div class="dot warning" id="statusDot"></div>
        <span id="statusText">Offline (Setup Firebase for Sync)</span>
    </div>

    <!-- Floating Undo / Redo Menu -->
    <div id="quick-tools">
        <button id="undoBtn" class="icon-btn" title="Undo Last Stroke">↩</button>
        <button id="redoBtn" class="icon-btn" title="Redo Last Stroke">↪</button>
    </div>

    <canvas id="drawCanvas"></canvas>

    <div id="toolbar">
        <span class="tool-label">Color</span>
        <input type="color" id="colorPicker" value="#00ffcc" title="Choose Color">
        <span class="tool-label">Size</span>
        <input type="range" id="brushSize" min="1" max="50" value="5" title="Brush Size">
        <button id="clearBtn" title="Clear Canvas">Clear</button>
        <button id="logoutBtn" title="Log Out" style="margin-top: 20px; border-color: #ff3333; color: #ff3333;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // IMPORT deleteDoc function for permanent clearing
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🛠️ STEP 1: PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyATqMFL9GpO3WYii-XRoehVKfPqvZI_cL8",
  authDomain: "mybookingappn8n.firebaseapp.com",
  projectId: "mybookingappn8n",
  storageBucket: "mybookingappn8n.firebasestorage.app",
  messagingSenderId: "644547863514",
  appId: "1:644547863514:web:35d6aa766861a359df96e3",
  measurementId: "G-2P5YMV3Y0M"
};
        // ==========================================

        const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY_HERE";

        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const toolbar = document.getElementById('toolbar');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Login Elements
        const loginOverlay = document.getElementById('login-overlay');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');

        let isDrawing = false, localLastX = 0, localLastY = 0;
        let currentStrokeId = null, currentStrokePoints = [], lastSyncTime = 0;
        let roomId = 'offline', knownStrokes = {}, localClearTimestamp = 0;
        
        // --- NEW VARIABLES FOR UNDO/REDO ---
        let myStrokes = [];
        let redoStrokes = [];
        let allStrokesData = {};
        
        let db, auth;
        let unsubStrokes = null, unsubBoard = null;

        function redrawAllStrokes() {
            clearLocalCanvas();
            knownStrokes = {};
            const sortedStrokes = Object.values(allStrokesData).sort((a, b) => a.timestamp - b.timestamp);

            sortedStrokes.forEach(data => {
                if (data.undone) return;
                if (data.timestamp <= localClearTimestamp) return;

                const points = data.points || [];
                if (points.length === 0) return;

                ctx.strokeStyle = data.color;
                ctx.lineWidth = data.size;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.beginPath();
                
                const startPt = getAbsolute(points[0].nx, points[0].ny);
                ctx.moveTo(startPt.x, startPt.y);
                
                for (let i = 1; i < points.length; i++) {
                    const pt = getAbsolute(points[i].nx, points[i].ny);
                    ctx.lineTo(pt.x, pt.y);
                }
                
                ctx.stroke();
                knownStrokes[data.id] = points.length;
            });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            clearLocalCanvas();
            knownStrokes = {}; 
        }

        function clearLocalCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const initSystem = async () => {
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                roomId = ipData.ip.replace(/[^a-zA-Z0-9]/g, '-');
            } catch (e) {
                console.warn("Could not detect network.");
            }

            if (isFirebaseConfigured) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                // Handle Login UI
                loginBtn.addEventListener('click', async () => {
                    loginError.innerText = "Logging in...";
                    try {
                        await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
                    } catch (error) {
                        loginError.innerText = "Error: " + error.message;
                    }
                });

                // Handle Logout
                logoutBtn.addEventListener('click', () => {
                    signOut(auth);
                });

                onAuthStateChanged(auth, (user) => {
                    if (unsubStrokes) unsubStrokes();
                    if (unsubBoard) unsubBoard();

                    if (!user) {
                        loginOverlay.style.display = 'flex';
                        statusDot.className = 'dot warning';
                        statusText.innerText = "Logged Out";
                        return;
                    }
                    
                    loginOverlay.style.display = 'none';

                    if (roomId === 'offline') {
                        statusText.innerText = "Offline Mode";
                        return;
                    }
                    
                    statusDot.className = 'dot connected';
                    statusText.innerText = `Wi-Fi Sync On (Room: ${roomId})`;

                    const strokesRef = collection(db, 'strokes_' + roomId);
                    unsubStrokes = onSnapshot(strokesRef, (snapshot) => {
                        let needsFullRedraw = false;

                        snapshot.docChanges().forEach(change => {
                            const doc = change.doc;
                            const data = doc.data();
                            const id = doc.id;
                            data.id = id;

                            if (change.type === 'removed') {
                                delete allStrokesData[id];
                                needsFullRedraw = true;
                            } else {
                                const prevData = allStrokesData[id];
                                allStrokesData[id] = data;
                                
                                // Trigger redraw if an existing stroke was undone or redone
                                if (prevData && prevData.undone !== data.undone) {
                                    needsFullRedraw = true;
                                }
                            }
                        });

                        if (needsFullRedraw) {
                            redrawAllStrokes();
                        } else {
                            // Incremental drawing for smooth real-time tracking
                            snapshot.docs.forEach(doc => {
                                const data = doc.data();
                                if (data.undone || data.timestamp <= localClearTimestamp) return;

                                const points = data.points || [];
                                const startIndex = knownStrokes[doc.id] || 0;
                                if (startIndex >= points.length) return;

                                ctx.strokeStyle = data.color;
                                ctx.lineWidth = data.size;
                                ctx.lineJoin = 'round';
                                ctx.lineCap = 'round';
                                ctx.beginPath();
                                
                                if (startIndex === 0) {
                                    const pt = getAbsolute(points[0].nx, points[0].ny);
                                    ctx.moveTo(pt.x, pt.y);
                                } else {
                                    const pt = getAbsolute(points[startIndex - 1].nx, points[startIndex - 1].ny);
                                    ctx.moveTo(pt.x, pt.y);
                                }
                                for (let i = startIndex; i < points.length; i++) {
                                    const pt = getAbsolute(points[i].nx, points[i].ny);
                                    ctx.lineTo(pt.x, pt.y);
                                }
                                
                                ctx.stroke();
                                knownStrokes[doc.id] = points.length;
                            });
                        }
                    }, (error) => {
                        console.error("Firestore sync error:", error);
                        statusText.innerText = "Sync Error: Check DB Rules";
                        statusDot.className = 'dot warning';
                    });

                    const boardStateRef = collection(db, 'board_state_' + roomId);
                    unsubBoard = onSnapshot(boardStateRef, (snapshot) => {
                        snapshot.forEach(doc => {
                            if (doc.id === 'main') {
                                const data = doc.data();
                                if (data.clearTrigger && data.clearTrigger > localClearTimestamp) {
                                    localClearTimestamp = data.clearTrigger;
                                    myStrokes = [];
                                    redoStrokes = [];
                                    redrawAllStrokes();
                                }
                            }
                        });
                    }, (error) => {
                        console.error("Board sync error:", error);
                    });
                });
            } else {
                loginOverlay.style.display = 'none';
            }
        };
        initSystem();

        // --- NEW COORDINATE MATH ---
        // Normalizes based on the center and a unified scale to prevent stretching
        function getNormalized(x, y) {
            const scale = Math.min(canvas.width, canvas.height);
            return {
                nx: (x - (canvas.width / 2)) / scale,
                ny: (y - (canvas.height / 2)) / scale
            };
        }

        function getAbsolute(nx, ny) {
            const scale = Math.min(canvas.width, canvas.height);
            return {
                x: (nx * scale) + (canvas.width / 2),
                y: (ny * scale) + (canvas.height / 2)
            };
        }
        // ---------------------------

        function getCoords(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function handleStart(e) {
            e.preventDefault(); 
            const { x, y } = getCoords(e);
            
            // Mobile Edge Tap to open Toolbar
            if (x > window.innerWidth - 40 && !toolbar.classList.contains('open')) {
                toolbar.classList.add('open');
                return; // Stop here so it doesn't draw a dot
            } else {
                toolbar.classList.remove('open'); // Auto-hide when drawing starts!
            }

            isDrawing = true;
            localLastX = x; localLastY = y;

            if (isFirebaseConfigured && auth?.currentUser) {
                currentStrokeId = Date.now().toString(36) + Math.random().toString(36).substring(2);
                
                const { nx, ny } = getNormalized(x, y);
                currentStrokePoints = [{ nx, ny }];
                
                // Track your personal history and clear redo timeline
                myStrokes.push(currentStrokeId);
                redoStrokes = [];
                
                const strokeDocRef = doc(db, 'strokes_' + roomId, currentStrokeId);
                setDoc(strokeDocRef, {
                    userId: auth.currentUser.uid,
                    color: colorPicker.value,
                    size: brushSize.value,
                    points: currentStrokePoints,
                    timestamp: Date.now(),
                    undone: false // Track visibility
                });
            }
        }

        function handleMove(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const { x, y } = getCoords(e);

            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(localLastX, localLastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            localLastX = x; localLastY = y;

            if (isFirebaseConfigured && auth?.currentUser && currentStrokeId) {
                // Use the new normalized math
                const { nx, ny } = getNormalized(x, y);
                currentStrokePoints.push({ nx, ny });
                
                if (Date.now() - lastSyncTime > 75) {
                    const strokeDocRef = doc(db, 'strokes_' + roomId, currentStrokeId);
                    updateDoc(strokeDocRef, { points: currentStrokePoints });
                    lastSyncTime = Date.now();
                }
            }
        }

        function handleEnd(e) {
            if (!isDrawing) return;
            isDrawing = false;
            if (isFirebaseConfigured && auth?.currentUser && currentStrokeId) {
                const strokeDocRef = doc(db, 'strokes_' + roomId, currentStrokeId);
                updateDoc(strokeDocRef, { points: currentStrokePoints });
            }
            currentStrokeId = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseout', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('touchcancel', handleEnd);

        // --- NEW UNDO / REDO LISTENERS ---
        undoBtn.addEventListener('click', () => {
            if (!isFirebaseConfigured || !auth?.currentUser || roomId === 'offline' || myStrokes.length === 0) return;
            const strokeToUndo = myStrokes.pop();
            redoStrokes.push(strokeToUndo);
            updateDoc(doc(db, 'strokes_' + roomId, strokeToUndo), { undone: true });
        });

        redoBtn.addEventListener('click', () => {
            if (!isFirebaseConfigured || !auth?.currentUser || roomId === 'offline' || redoStrokes.length === 0) return;
            const strokeToRedo = redoStrokes.pop();
            myStrokes.push(strokeToRedo);
            updateDoc(doc(db, 'strokes_' + roomId, strokeToRedo), { undone: false });
        });
        // ---------------------------------

        clearBtn.addEventListener('click', () => {
            if (isFirebaseConfigured && auth?.currentUser && roomId !== 'offline') {
                
                // 💥 PERMANENT DELETION: Physically delete all documents from the database
                Object.keys(allStrokesData).forEach(id => {
                    deleteDoc(doc(db, 'strokes_' + roomId, id)).catch(err => console.error("Deletion error:", err));
                });
                
                // Keep trigger as a backup mechanism to instantly clear other screens currently looking at it
                const triggerTime = Date.now();
                const boardStateRef = doc(db, 'board_state_' + roomId, 'main');
                setDoc(boardStateRef, { clearTrigger: triggerTime }, { merge: true });
            }
            
            // Clear local tracking variables
            clearLocalCanvas();
            knownStrokes = {};
            allStrokesData = {};
            myStrokes = [];
            redoStrokes = [];
            localClearTimestamp = Date.now();
        });
    </script>
</body>
</html>
